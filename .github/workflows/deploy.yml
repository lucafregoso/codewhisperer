name: Deploy to GitHub Pages

# Con git flow, master è "ciò che è live": il deploy parte solo da qui.
# I drop di contenuto (nuove edizioni in input/) committano direttamente su
# master; se il parse fallisce, la build fallisce e il sito non regredisce.
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build production site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://lucafregoso.github.io' }}
      BASE_PATH: ${{ vars.BASE_PATH || '/codewhisperer/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check Astro and TypeScript
        run: pnpm run check

      - name: Run unit tests (parser)
        run: pnpm run test:unit

      # I drop di contenuto vanno dritti su master (costituzione §10):
      # anche il deploy esegue l'e2e completo — il sito non regredisce mai.
      # ATTENZIONE all'ordine: l'e2e ricostruisce dist/ con la build di test
      # (base "/", site 127.0.0.1:4399). La build di produzione DEVE venire
      # dopo, o su Pages finisce l'artifact sbagliato (successo il 17 luglio
      # 2026: CSS 404 e canonical su localhost in produzione).
      - name: Run end-to-end tests
        run: pnpm test

      - name: Build production site
        run: pnpm run build

      - name: Verify dist is the production build
        run: |
          grep -q "href=\"${BASE_PATH%/}/_astro" dist/index.html
          if grep -rq "127.0.0.1:4399" dist/index.html; then
            echo "dist/ contiene URL della build di test" >&2
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
