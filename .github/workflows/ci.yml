name: Pull request checks

on:
  pull_request:
    branches:
      - develop
      - master

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate (check + unit + build + e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SITE_URL: ${{ vars.SITE_URL || 'https://lucafregoso.github.io' }}
      BASE_PATH: ${{ vars.BASE_PATH || '/codewhisperer/' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check Astro and TypeScript
        run: pnpm run check

      - name: Run unit tests (parser)
        run: pnpm run test:unit

      - name: Build production site
        run: pnpm run build

      - name: Run end-to-end tests
        run: pnpm test
